<details id="details-el" class="flex flex-col" data-ajt-mode="replaceContent">
    <summary>{{ summary }}</summary>
    <div>
        {% if text %}
        {{ text }}
        {% else %}
        <a class="link" href="{% url 'examples:replace_content:more' %}" data-ajt-trigger="click">Show more</a>
        {% endif %}
    </div>
</details>
